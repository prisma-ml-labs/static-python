<!DOCTYPE html>
<html>
<head>
    <title>Embedding Comparison Demo</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        h1 { color: #333; }
        .input-group { margin: 20px 0; }
        input[type="text"] { width: 70%; padding: 10px; font-size: 16px; }
        button { padding: 10px 20px; font-size: 16px; background: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background: #0056b3; }
        .result { margin-top: 30px; padding: 20px; background: #f5f5f5; border-radius: 8px; }
        .similarity { font-size: 24px; font-weight: bold; color: #28a745; }
        .error { color: #dc3545; }
        .embed-preview { font-family: monospace; font-size: 12px; color: #666; }
    </style>
</head>
<body>
    <h1>Embedding Comparison Demo</h1>
    <p>Compare local C++ embedder vs OpenAI-compatible API</p>
    
    <div class="input-group">
        <input type="text" id="textInput" placeholder="Enter text to compare..." value="hello world">
        <button onclick="compare()">Compare</button>
    </div>
    
    <div id="result"></div>
    
    <script>
        async function compare() {
            const text = document.getElementById('textInput').value;
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Loading...';
            
            try {
                const resp = await fetch('/compare', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                    body: 'text=' + encodeURIComponent(text)
                });
                const data = await resp.json();
                
                if (data.error) {
                    resultDiv.innerHTML = '<div class="result error">' + data.error + '</div>';
                    return;
                }
                
                resultDiv.innerHTML = `
                    <div class="result">
                        <p><strong>Text:</strong> ${text}</p>
                        <p><strong>Cosine Similarity:</strong> <span class="similarity">${(data.similarity * 100).toFixed(2)}%</span></p>
                        <p><strong>Local Embedding:</strong> <span class="embed-preview">[${data.local_embedding.join(', ')}...]</span></p>
                        <p><strong>Remote Embedding:</strong> <span class="embed-preview">[${data.remote_embedding.join(', ')}...]</span></p>
                    </div>
                `;
            } catch (e) {
                resultDiv.innerHTML = '<div class="result error">Error: ' + e.message + '</div>';
            }
        }
    </script>
</body>
</html>
