name: Build Wheels

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Build wheels
      uses: pypa/cibuildwheel@v2.16.2
      env:
        CIBW_BUILD: "cp39-manylinux* cp310-manylinux* cp311-manylinux* cp312-manylinux* cp313-manylinux*"
        CIBW_SKIP: "*-musllinux*"
        CIBW_MANYLINUX_X86_64_IMAGE: "manylinux2014"
        CIBW_BEFORE_ALL_LINUX: |
          yum install -y cmake gcc-c++ python3-devel
        CIBW_BEFORE_BUILD_LINUX: |
          pip install pybind11 numpy
        CIBW_BUILD_VERBOSITY: 1

    - uses: actions/upload-artifact@v4
      with:
        name: wheels-${{ matrix.os }}
        path: ./wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    container: fedora:latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install dependencies
      run: |
        dnf install -y python3-pip python3-pybind11 python3-numpy gcc-c++ cmake make git

    - name: Build sdist
      run: |
        python3 -m pip install --upgrade pip
        python3 -m pip install build
        python3 -m build --sdist .

    - uses: actions/upload-artifact@v4
      with:
        name: sdist
        path: dist/*.tar.gz

  test_sdist:
    needs: build_sdist
    name: Test source distribution
    runs-on: ubuntu-latest
    container: fedora:latest

    steps:
    - uses: actions/download-artifact@v4
      with:
        name: sdist
        path: dist

    - run: dnf install -y python3-pip python3-pybind11 python3-numpy gcc-c++ cmake make git

    - name: Install and test
      run: |
        python3 -m pip install --upgrade pip
        python3 -m pip install dist/*.tar.gz
        python3 -c "from static import EmbeddingPipeline; print('OK')"

  publish:
    needs: [build_wheels, test_sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
    - uses: actions/download-artifact@v4
      with:
        path: dist
        merge-multiple: true

    - name: Publish to PyPI
      uses: pypa/publish-action@v1
      with:
        user: __token__
        password: ${{ secrets.PYPI_API_TOKEN }}
