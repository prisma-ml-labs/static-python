name: Sync bindings from upstream

on:
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sundays
  workflow_dispatch:  # Manual trigger

jobs:
  check-updates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout static-python
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Fetch upstream static repo
        run: |
          git clone --depth 1 https://github.com/prisma-ml-labs/static /tmp/upstream-static

      - name: Check for C++ binding updates
        id: check
        run: |
          # Check if upstream has new/changed C++ source files we don't have
          # Compare src/ directory - files only in upstream = new changes to sync
          diff -rq /tmp/upstream-static/src static/src > /tmp/diff.txt 2>&1 || true
          
          # Filter to only "Only in upstream" lines (new files we need)
          grep "^Only in /tmp/upstream-static" /tmp/diff.txt > /tmp/changes.txt 2>&1 || true
          
          if [ -s /tmp/changes.txt ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "DIFF_CONTENT<<EOF" >> $GITHUB_ENV
            cat /tmp/changes.txt >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Create PR with updates
        if: steps.check.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Update C++ bindings from upstream"
          title: "Update C++ bindings from upstream static"
          body: |
            Sync C++ source files from https://github.com/prisma-ml-labs/static
            
            Changes detected:
            ```
            ${{ env.DIFF_CONTENT }}
            ```
            
            Please review before merging.
          branch: sync-bindings-upstream
          delete-branch: true
